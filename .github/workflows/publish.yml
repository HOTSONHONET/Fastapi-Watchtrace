name: Publish to PyPI

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync

      - name: Run unit tests
        run: uv run --with pytest pytest tests/unit_test

      - name: Build package
        run: uv build

      - name: Check package metadata
        run: uv run --with twine twine check dist/*

      - name: Run wheel smoke test
        run: ./scripts/smoke_test_wheel.sh

      - name: Publish to PyPI
        run: uv run --with twine twine upload dist/* -u __token__ -p "${{ secrets.PYPI_API_TOKEN }}"
